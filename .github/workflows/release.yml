name: Build and Release

on:
  push:
    tags:
      - "*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Version de la release, par exemple 1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build and Release
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.20.5"
          cache: true

      - name: Build Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o authy-export-linux-amd64 \
            ./cmd/authy-export

      - name: Build macOS binary
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o authy-export-darwin-arm64 \
            ./cmd/authy-export

      - name: Build Windows binary
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o authy-export-windows-amd64.exe \
            ./cmd/authy-export

      - name: Generate checksums
        run: |
          sha256sum \
            authy-export-linux-amd64 \
            authy-export-darwin-arm64 \
            authy-export-windows-amd64.exe \
            > checksums.txt

      - name: Verify generated files
        run: |
          set -euo pipefail

          test -f authy-export-linux-amd64
          test -f authy-export-darwin-arm64
          test -f authy-export-windows-amd64.exe
          test -f checksums.txt

          ls -lah \
            authy-export-linux-amd64 \
            authy-export-darwin-arm64 \
            authy-export-windows-amd64.exe \
            checksums.txt

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin \
            "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Le tag ${RELEASE_TAG} existe déjà."
          else
            echo "Création du tag ${RELEASE_TAG} sur ${GITHUB_SHA}."
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Create GitHub release and upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "La release ${RELEASE_TAG} existe déjà. Mise à jour des fichiers."

            gh release upload "${RELEASE_TAG}" \
              authy-export-linux-amd64 \
              authy-export-darwin-arm64 \
              authy-export-windows-amd64.exe \
              checksums.txt \
              --clobber
          else
            echo "Création de la release ${RELEASE_TAG}."

            gh release create "${RELEASE_TAG}" \
              authy-export-linux-amd64 \
              authy-export-darwin-arm64 \
              authy-export-windows-amd64.exe \
              checksums.txt \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --verify-tag
          fi

      - name: Show release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${RELEASE_TAG}" \
            --json url,tagName,isDraft,assets \
            --jq '{
              url: .url,
              tag: .tagName,
              draft: .isDraft,
              assets: [.assets[].name]
            }'
