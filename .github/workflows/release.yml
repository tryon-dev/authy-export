name: Build and Release

on:
  push:
    tags:
      - "*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.20.5"
          cache: true

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags="-s -w" \
              -o authy-export-linux-amd64 \
              ./cmd/authy-export

          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build \
              -trimpath \
              -ldflags="-s -w" \
              -o authy-export-darwin-arm64 \
              ./cmd/authy-export

          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags="-s -w" \
              -o authy-export-windows-amd64.exe \
              ./cmd/authy-export

      - name: Generate checksums
        run: |
          sha256sum \
            authy-export-linux-amd64 \
            authy-export-darwin-arm64 \
            authy-export-windows-amd64.exe \
            > checksums.txt

      - name: Create draft release and upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            authy-export-linux-amd64 \
            authy-export-darwin-arm64 \
            authy-export-windows-amd64.exe \
            checksums.txt \
            --title "$RELEASE_TAG" \
            --draft \
            --verify-tag
